name: Radar Diario

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  ejecutar-radar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Ejecutar run_radar.py
        run: python run_radar.py
        env:
          TIINGO_KEY: ${{ secrets.TIINGO_KEY }}
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}

      - name: Ejecutar asistente
        run: python src/asistente_v5.py

      - name: Subir informes
        uses: actions/upload-artifact@v4
        with:
          name: informes
          path: informes/
