name: Radar Diario

on:
  schedule:
    # Se ejecutará todos los días a las 20:00 UTC (ajusta la hora si quieres)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Crear archivo con la clave de Tiingo
      run: echo "${{ secrets.TIINGO_KEY }}" > tiingo_key.txt

    - name: Ejecutar el radar
      run: python run_radar.py

    - name: Subir resultados (exposición y dashboard)
      uses: actions/upload-artifact@v4
      with:
        name: resultados-radar
        path: |
          ultima_exposicion.txt
          dashboard.png