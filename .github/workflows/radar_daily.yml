name: Radar Diario

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear carpetas necesarias
        run: |
          mkdir -p data
          mkdir -p outputs

      - name: Ejecutar radar
        run: python run.py

      - name: Subir reporte principal
        uses: actions/upload-artifact@v4
        with:
          name: reporte-diario
          path: outputs/reporte_diario.md

      - name: Subir gráfico de dispersión
        uses: actions/upload-artifact@v4
        with:
          name: grafico-dispersion
          path: outputs/flow_dispersion.png

      - name: Subir histórico de flujos
        uses: actions/upload-artifact@v4
        with:
          name: historico-flujos
          path: outputs/flow_history.csv

      - name: Subir análisis de líderes (si existe)
        uses: actions/upload-artifact@v4
        with:
          name: analisis-lideres
          path: |
            outputs/analisis_lideres.md
            outputs/analisis_lideres.csv
          if-no-files-found: ignore

      - name: Commit y push del histórico CFTC (si cambió)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "data/cftc_history.csv" ]; then
            git add data/cftc_history.csv
            git commit -m "Actualizar histórico CFTC" || echo "No hay cambios"
            git push
          else
            echo "No existe data/cftc_history.csv, se omite el commit"
          fi
