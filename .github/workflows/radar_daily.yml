name: Radar Diario

on:
  schedule:
    - cron: '0 20 * * *'   # Ejecutar a las 20:00 UTC
  workflow_dispatch:        # Permite ejecución manual

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Crear archivo con la clave de Tiingo
      run: echo "${{ secrets.TIINGO_KEY }}" > tiingo_key.txt

    - name: Ejecutar el radar
      run: python run_radar.py

    # NUEVO: Generar informe ejecutivo
    - name: Generar informe del asistente V2
      run: python src/asistente_informe_v2.py

    # Subir archivos importantes como artefactos (backup en la nube de GitHub)
    - name: Subir artefactos (backup)
      uses: actions/upload-artifact@v4
      with:
        name: radar-backup-${{ github.run_id }}
        path: |
          ultima_exposicion.txt
          logs/json/ultimo_log.json      # Ruta actualizada
          historial_radar.csv
          freeze_watchdog.txt
          alertas.txt
          informe_radar.md                # Nuevo informe
          logs/parquet/*.parquet          # Opcional: respaldo de logs de riesgo

    # Hacer commit de los archivos actualizados al repositorio
    - name: Hacer commit de los archivos actualizados
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add ultima_exposicion.txt logs/json/ultimo_log.json historial_radar.csv informe_radar.md
        git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática del radar [skip ci]"
        git push