name: Watchdog

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pandas pyyaml

    - name: Ejecutar watchdog
      run: python src/drift_handler.py --watchdog

    - name: Hacer commit si se ha creado freeze_watchdog.txt
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add freeze_watchdog.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Watchdog: activado freeze [skip ci]"
        git push