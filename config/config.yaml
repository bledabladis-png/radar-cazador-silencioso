# config.yaml - Radar Macro Rotaci?n Global v2.3.1
version: "v2.3.1"

# Pesos base para el score provisional (se suman a 1)
weights:
  base:
    liquidity: 0.20
    bonds: 0.20
    regime: 0.18
    leadership: 0.14
    geo: 0.10
    stress: 0.05
    breadth: 0.13

# Factores de penalizaci?n
penalties:
  stress_factor: 0.5
  dispersion_factor: 0.5
  dispersion_max: 0.8
  breadth_factor: 0.3

# Configuraci?n de exposici?n base
exposicion:
  base_tramos:
    - min: -1.0
      max: -0.5
      exp_min: 0.0
      exp_max: 0.0
    - min: -0.5
      max: 0.0
      exp_min: 0.0
      exp_max: 0.3
    - min: 0.0
      max: 0.5
      exp_min: 0.3
      exp_max: 0.7
    - min: 0.5
      max: 1.0
      exp_min: 0.7
      exp_max: 1.0

# Cash forzado por VIX/ATR
cash_forzado:
  ratio_umbral: 1.2
  escalones:
    - hasta: 1.2
      factor: 1.0
    - hasta: 1.4
      factor: 0.8
    - hasta: 1.5
      factor: 0.5
    - hasta: null
      factor: 0.2

# Penalizaci?n por liquidez
spread_alert:
  umbral: 0.005
  min_factor: 0.5

# Costes de turnover
turnover:
  cost_factor: 0.001
  commission: 5.0

# Par?metros de persistencia
persistence_days: 3

# Ventana de normalizaci?n robusta
scaling_window: 252

# Configuraci?n de cada motor base (con horizontes y pesos actualizados)
regime_engine:
  tickers: ["SPY", "TLT"]
  horizons: [1, 5, 21]
  weights: [0.5, 0.3, 0.2]
  persistence_days: 3
  scaling_window: 252

leadership_engine:
  tickers: ["XLK", "XLF"]
  horizons: [1, 5, 21]
  weights: [0.5, 0.3, 0.2]
  persistence_days: 3
  scaling_window: 252

geographic_engine:
  tickers: ["EEM", "EFA"]
  horizons: [1, 5, 21]
  weights: [0.5, 0.3, 0.2]
  persistence_days: 3
  scaling_window: 252

bond_engine:
  tickers: ["JNK", "LQD"]
  horizons: [1, 5, 21]
  weights: [0.5, 0.3, 0.2]
  persistence_days: 3
  scaling_window: 252

stress_engine:
  tickers: ["^VIX"]
  horizons: [1, 5, 21]
  weights: [0.5, 0.3, 0.2]
  persistence_days: 3
  scaling_window: 252
  invert_signal: true

liquidity_engine:
  tickers: ["DX-Y.NYB", "TIP", "TLT", "spread_10y2y"]
  horizons: [1, 5, 21]
  weights: [0.5, 0.3, 0.2]
  persistence_days: 3
  scaling_window: 252
  invert_dxy: true

breadth_engine:
  tickers: ["RSP", "IWM", "SPY"]
  horizons: [1, 5, 21]
  weights: [0.5, 0.3, 0.2]
  persistence_days: 3
  scaling_window: 252
  spread_weights: [0.6, 0.4]

# Motores V7 (par?metros opcionales)
v7:
  riesgo_sistemico:
    vix_weight: 0.4
    credit_spread_weight: 0.4
    bond_vol_weight: 0.2
    window_vol: 20
  carry_trade:
    jpy_weight: -0.4
    aud_weight: 0.3
    spy_weight: 0.3
  ciclo_institucional:
    expansion_score: 0.4
    acumulacion_score: 0.0
    distribucion_score: 0.0
    capitulacion_score: -0.3
    capitulacion_stress: -0.3

# Logging y datos
logging:
  schema_file: "config/schemas/log_schema.json"
  retention_days: 1825

data:
  tiingo_key_file: "tiingo_key.txt"
  twelvedata_key_file: "twelvedata_key.txt"
  fallback_sources: ["yahoo", "fred"]
  tickers:
    macro:
      - "SPY"
      - "TLT"
      - "XLK"
      - "XLF"
      - "EEM"
      - "EFA"
      - "JNK"
      - "LQD"
      - "^VIX"
      - "DX-Y.NYB"
      - "TIP"
      - "RSP"
      - "IWM"
      - "HYG"
      - "QQQ"
      - "JPY=X"
      - "AUD=X"
      - "^NYAD"
      - "^NA50"
      - "^NYHL"
  ohlc_tickers:
    - "SPY"
    - "JNK"
    - "LQD"
    - "EEM"
    - "IWM"
    - "XLY"
    - "XLP"
    - "EFA"
    - "ACWI"
    - "TLT"
    - "IBGL"
    - "QQQ"
    - "HYG"
    - "TIP"
    - "XLK"
    - "XLF"
    - "XLI"
    - "XLE"
    - "XLB"
    - "XLV"
    - "XLU"
    - "XLRE"
    - "XLC"
  fred_series:
    DGS10: "10-Year Treasury Constant Maturity Rate"
    DGS2: "2-Year Treasury Constant Maturity Rate"
